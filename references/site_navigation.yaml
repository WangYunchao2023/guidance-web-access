# 网站导航配置
# 用于记录难以通过搜索/导航找到的内容的特定路径

# ============ CDE 药品审评中心 ============
cde:
  name: "CDE药品审评中心"
  base_url: "https://www.cde.org.cn"
  
  # 指导原则主入口（重要！）
  guidance_url: "https://www.cde.org.cn/zdyz/index"
  
  # 常用分类页面
  categories:
    # 指导原则主站
    - name: "指导原则"
      url: "https://www.cde.org.cn/zdyz/index"
      keywords: ["指导原则", "技术要求"]
      is_main: true
      
    # 指导原则 - 工作动态/信息公开（备用）
    - name: "指导原则(工作动态)"
      url: "https://www.cde.org.cn/main/xxgk/listpage/9f9c74c73e0f8f56a8bfbc646055026d"
      keywords: ["指导原则", "技术要求"]
      date_filter: true
    
    # 受理品种信息
    - name: "受理品种信息"
      url: "https://www.cde.org.cn/main/xxgk/listpage/2f78f372b351c6851af7431c7710286e"
      keywords: ["受理", "品种"]
      
    # 审评报告
    - name: "审评报告"
      url: "https://www.cde.org.cn/main/xxgk/listpage/7f6c6a5f6e0f8f56a8bfbc646055026d"
      keywords: ["审评报告", "上市许可"]
      
    # 临床试验默示许可
    - name: "临床试验默示许可"
      url: "https://www.cde.org.cn/main/xxgk/listpage/4b5255eb0a84820cef4ca3e8b6bbe20c"
      keywords: ["临床试验", "默示许可"]
      
    # 工作动态
    - name: "工作动态"
      url: "https://www.cde.org.cn/main/xxgk/listpage/1f78f372b351c6851af7431c7710286e"
      keywords: ["工作动态", "发布"]
  
  # 按日期筛选的URL模式
  date_patterns:
    # 例如：2026年3月的指导原则
    - url_template: "https://www.cde.org.cn/main/xxgk/listpage/9f9c74c73e0f8f56a8bfbc646055026d?dateFrom={year}-{month:02d}-01&dateTo={year}-{month:02d}-31"
      description: "按月份筛选指导原则"
      
  # 搜索页面的特殊选择器
  search_selectors:
    - "input#keyword"
    - "input[name='keyword']"
    - "#keyword"
    - "input[type='text'][placeholder*='搜索']"

# ============ FDA ============
fda:
  name: "FDA"
  base_url: "https://www.fda.gov"
  
  categories:
    - name: "Drugs Guidance"
      url: "https://www.fda.gov/drugs/guidance-compliance-regulatory-information"
      keywords: ["guidance", "guideline"]
      
    - name: "Drug Approval"
      url: "https://www.fda.gov/drugs/drug-approvals-and-databases"
      keywords: ["approval", "label"]
      
    - name: "CDER Guidance Documents"
      url: "https://www.fda.gov/regulatory-information/search-fda-guidance-documents/cder-guidance-documents"
      keywords: ["cder", "guidance"]

# ============ NMPA ============
nmpa:
  name: "国家药监局"
  base_url: "https://www.nmpa.gov.cn"
  
  categories:
    - name: "药品"
      url: "https://www.nmpa.gov.cn/channel/xxgk/listchannel_2.htm"
      keywords: ["药品", "注册"]
      
    - name: "法规"
      url: "https://www.nmpa.gov.cn/channel/xxgk/listchannel_1.htm"
      keywords: ["法规", "规章"]
